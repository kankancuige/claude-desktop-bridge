name: 三平台构建

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            target: win
            electronBuilderArgs: --win nsis
          - os: macos-latest
            label: macOS
            target: mac
            electronBuilderArgs: --mac
          - os: ubuntu-latest
            label: Linux
            target: linux
            electronBuilderArgs: --linux

    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════════
      # Node.js + pnpm
      # ════════════════════════════════════════════════════════════
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ════════════════════════════════════════════════════════════
      # Linux 环境依赖
      # ════════════════════════════════════════════════════════════
      - name: 安装 Linux 打包依赖 (libfuse2 + 编译工具)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 build-essential python3

      # ════════════════════════════════════════════════════════════
      # Gateway 依赖
      # ════════════════════════════════════════════════════════════
      - name: 安装 Gateway 依赖
        working-directory: gateway
        run: npm install --legacy-peer-deps

      # ════════════════════════════════════════════════════════════
      # Desktop UI 依赖 + 构建
      # ════════════════════════════════════════════════════════════
      - name: 安装 Desktop UI 依赖
        working-directory: desktop-ui
        run: pnpm install --frozen-lockfile

      - name: Vite 构建前端
        working-directory: desktop-ui
        run: npx vite build

      - name: electron-builder 打包
        working-directory: desktop-ui
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.electronBuilderArgs }} --publish never

      # Windows：手动打 zip 解压包（electron-builder 的 zip target 在 NSIS 下可能不产出）
      - name: 生成 Windows zip
        if: matrix.target == 'win'
        shell: bash
        working-directory: desktop-ui
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd dist-electron/win-unpacked
          zip -r "../Claude Desktop Bridge-${VERSION}-win.zip" .
          echo "zip 生成完成"

      # ════════════════════════════════════════════════════════════
      # 上传构建产物
      # ════════════════════════════════════════════════════════════
      - name: 上传 Windows
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Desktop-Bridge-Windows
          path: |
            desktop-ui/dist-electron/*.exe
            desktop-ui/dist-electron/*.zip
          if-no-files-found: error

      - name: 生成 macOS zip
        if: matrix.target == 'mac'
        shell: bash
        working-directory: desktop-ui
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -d dist-electron/mac-arm64 ]; then
            cd dist-electron/mac-arm64
            zip -r "../Claude Desktop Bridge-${VERSION}-mac-arm64.zip" .
          elif [ -d dist-electron/mac ]; then
            cd dist-electron/mac
            zip -r "../Claude Desktop Bridge-${VERSION}-mac.zip" .
          fi
          echo "macOS zip 生成完成"

      - name: 上传 macOS
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Desktop-Bridge-macOS
          path: |
            desktop-ui/dist-electron/*.dmg
            desktop-ui/dist-electron/*.zip
          if-no-files-found: error

      - name: 生成 Linux zip
        if: matrix.target == 'linux'
        shell: bash
        working-directory: desktop-ui
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -d dist-electron/linux-unpacked ]; then
            cd dist-electron/linux-unpacked
            zip -r "../Claude Desktop Bridge-${VERSION}-linux.zip" .
          fi
          echo "Linux zip 生成完成"

      - name: 上传 Linux

  # ══════════════════════════════════════════════════════════════════
  # 发布 Release（仅 tag 推送触发）
  # ══════════════════════════════════════════════════════════════════
  release:
    name: 发布 GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 列出产物
        run: ls -lhR artifacts/

      - name: 创建 GitHub Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ════════════════════════════════════════════════════════════════
      # 同步 Release 到 Gitee（仅创建空 Release + 链接，文件手动上传）
      # ════════════════════════════════════════════════════════════════
      - name: 同步 Release 到 Gitee
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          GH_RELEASE="https://github.com/kankancuige/claude-desktop-bridge/releases/tag/$TAG"
          BODY="GitHub: $GH_RELEASE"

          RELEASES=$(curl -s "https://gitee.com/api/v5/repos/kankancuige/claude-desktop-bridge/releases?access_token=$GITEE_TOKEN")
          EXISTING_ID=$(echo "$RELEASES" | jq -r --arg TAG "$TAG" '.[] | select(.tag_name==$TAG) | .id')
          if [ -n "$EXISTING_ID" ]; then
            curl -s -X DELETE "https://gitee.com/api/v5/repos/kankancuige/claude-desktop-bridge/releases/$EXISTING_ID?access_token=$GITEE_TOKEN"
          fi

          curl -s -X POST "https://gitee.com/api/v5/repos/kankancuige/claude-desktop-bridge/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"$GITEE_TOKEN\",\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":$(echo "$BODY" | jq -Rs .)}"
          echo "Gitee Release 创建完成，请手动下载 GitHub 文件并上传到 Gitee"
